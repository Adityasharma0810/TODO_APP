name: Build Installer

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Setup Rust
        uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          target: x86_64-pc-windows-gnu
          toolchain: stable

      - name: Install LLVM-MinGW (UCRT)
        shell: pwsh
        run: |
          # Download and extract LLVM-MinGW
          curl -sL "https://github.com/mstorsjo/llvm-mingw/releases/download/20260602/llvm-mingw-20260602-ucrt-x86_64.zip" -o "$env:TEMP\mingw.zip"
          Expand-Archive -Path "$env:TEMP\mingw.zip" -DestinationPath "$env:TEMP\mingw" -Force
          echo "$env:TEMP\mingw\llvm-mingw-20260602-ucrt-x86_64\bin" | Out-File -FilePath $env:GITHUB_PATH -Append
          echo "MINGW_ROOT=$env:TEMP\mingw\llvm-mingw-20260602-ucrt-x86_64" | Out-File -FilePath $env:GITHUB_ENV -Append

      - name: Configure MinGW stubs
        shell: pwsh
        run: |
          $mingw = "$env:MINGW_ROOT"
          # Create stub libgcc/libgcc_eh from libunwind if they don't exist
          if (-not (Test-Path "$mingw\x86_64-w64-mingw32\lib\libgcc.a")) {
            $libunwind = "$mingw\x86_64-w64-mingw32\lib\libunwind.a"
            $objects = & $mingw\bin\ar t $libunwind
            & $mingw\bin\ar rcs "$mingw\x86_64-w64-mingw32\lib\libgcc.a" $libunwind
            Copy-Item "$mingw\x86_64-w64-mingw32\lib\libgcc.a" "$mingw\x86_64-w64-mingw32\lib\libgcc_eh.a"
          }
          # Write cargo config
          New-Item -ItemType Directory -Path ".cargo" -Force | Out-Null
          @"
          [target.x86_64-pc-windows-gnu]
          linker = "x86_64-w64-mingw32-gcc"
"@ | Set-Content -Path ".cargo\config.toml"

      - name: Install frontend dependencies
        run: npm ci

      - name: Build Tauri app
        shell: pwsh
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        run: npm run tauri build

      - name: Upload installer (MSI)
        uses: actions/upload-artifact@v4
        with:
          name: Daily-Consistency-Tracker-Windows
          path: src-tauri/target/release/bundle/msi/*.msi
          if-no-files-found: warn

      - name: Upload installer (NSIS)
        uses: actions/upload-artifact@v4
        with:
          name: Daily-Consistency-Tracker-Windows-NSIS
          path: src-tauri/target/release/bundle/nsis/*.exe
          if-no-files-found: warn

      - name: Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            src-tauri/target/release/bundle/msi/*.msi
            src-tauri/target/release/bundle/nsis/*.exe
