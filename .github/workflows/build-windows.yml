name: Build Windows executable

on:
  workflow_dispatch: {}
  push:
    branches:
      - main

jobs:
  build-windows:
    name: Build Windows executable (Tauri, cross-compiled)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install Node dependencies
        run: npm ci

      - name: Build frontend
        run: npm run build

      - name: Setup Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-gnu
          components: clippy, rustfmt

      - name: Install mingw-w64 cross toolchain
        run: |
          sudo apt-get update
          sudo apt-get install -y mingw-w64

      - name: Cross-compile Windows binary
        run: cargo build --release --target x86_64-pc-windows-gnu --manifest-path src-tauri/Cargo.toml

      - name: Upload built binary
        uses: actions/upload-artifact@v4
        with:
          name: tauri-windows-binary
          path: src-tauri/target/x86_64-pc-windows-gnu/release/*.exe
