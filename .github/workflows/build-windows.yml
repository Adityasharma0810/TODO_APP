name: Build Windows executable

on:
  workflow_dispatch: {}
  push:
    branches:
      - main

jobs:
  build-windows:
    name: Build Windows executable (Tauri)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Clear npm cache
        run: npm cache clean --force

      - name: Install Node dependencies (workaround npm optional deps bug)
        run: |
          echo 'Removing node_modules and package-lock.json from workspace (CI only)'
          rm -rf node_modules package-lock.json
          npm install

      - name: Build frontend
        run: npm run build

      - name: Setup Rust toolchain
        uses: actions-rs/toolchain@v1
        with:
          toolchain: stable
          override: true
          profile: minimal

      - name: Ensure Rust components
        run: |
          rustup component add clippy rustfmt || echo "components may already be installed"

      - name: Install Tauri dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev \
            build-essential \
            curl \
            wget \
            file \
            libssl-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev

      - name: Build Tauri app (cross-compile to Windows)
        run: npm run tauri build -- --target x86_64-pc-windows-gnu

      - name: Upload built bundle
        uses: actions/upload-artifact@v4
        with:
          name: tauri-windows-bundle
          path: src-tauri/target/x86_64-pc-windows-gnu/release/bundle/**
