name: Build Windows executable

on:
  workflow_dispatch: {}
  push:
    branches:
      - main

jobs:
  build-windows:
    name: Build Windows installer (Tauri, cross-compiled NSIS)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install Node dependencies
        run: npm ci

      - name: Setup Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-gnu

      - name: Install cross-compilation and NSIS tooling
        run: |
          sudo apt-get update
          sudo apt-get install -y mingw-w64 nsis clang llvm lld

      - name: Build Tauri app (NSIS installer, cross-compiled)
        run: npm run tauri build -- --target x86_64-pc-windows-gnu --bundles nsis

      - name: Upload NSIS installer
        uses: actions/upload-artifact@v4
        with:
          name: daily-consistency-tracker-windows-installer
          path: src-tauri/target/x86_64-pc-windows-gnu/release/bundle/nsis/*.exe
